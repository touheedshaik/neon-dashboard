<div class="profile-page">

  <!-- TITLE -->
  <div class="profile-title">
    <h1>MY PROFILE</h1>
    <p>Account Information</p>
  </div>

  <!-- PROFILE CARD -->
  <div class="card profile-card">

    <div class="avatar">
      <div class="avatar-circle">
        <i class="fa fa-user"></i>
      </div>
    </div>

    <h2 class="name">SARAH JOHNSON</h2>
    <p class="email">demo@360net.co.nz</p>

    <div class="active-badge">
   <i class="fas fa-bolt pulse"></i>
   <span>ACTIVE</span>
</div>

  </div>

  <!-- DETAILS CARD -->
  <div class="card details-card">

    <div class="profile-item">
  <div class="profile-icon cyan">
    <i class="fas fa-phone"></i>
  </div>
  <div class="profile-info">
    <p class="profile-label cyan">PHONE</p>
    <p class="profile-value">+64 21 123 4567</p>
  </div>
</div>

<div class="divider"></div>

<div class="profile-item">
  <div class="profile-icon purple">
    <i class="fas fa-map-marker-alt"></i>
  </div>
  <div class="profile-info">
    <p class="profile-label purple">ADDRESS</p>
    <p class="profile-value">42 Queen Street, Auckland 1010</p>
  </div>
</div>

    <div class="divider"></div>

    <!-- CURRENT PLAN -->
<div class="profile-item">
  <div class="profile-icon pink">
    <i class="fas fa-box"></i>
  </div>
  <div class="profile-info">
    <p class="profile-label pink">CURRENT PLAN</p>
    <p class="profile-value plan-value">HyperNet4000</p>
  </div>
</div>

<div class="divider"></div>

<!-- ACCOUNT NUMBER -->
<div class="profile-item">
  <div class="profile-icon cyan">
    <i class="fas fa-id-card"></i>
  </div>
  <div class="profile-info">
    <p class="profile-label cyan">ACCOUNT NUMBER</p>
    <p class="profile-value account-value">360NET-2024-0001</p>
  </div>
</div>

</div>
<!-- MANAGE PLAN -->
<button class="btn-secondary">
  <i class="fas fa-box"></i>
  <span>MANAGE PLAN</span>
</button>

<!-- LOGOUT -->
<button class="btn-danger"
        (click)="logout()">
  <i class="fas fa-sign-out-alt"></i>
  <span>LOGOUT</span>
</button>
