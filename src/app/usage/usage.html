<div class="usage-page">

  <!-- HEADER -->
  <div class="page-header">
    <h1 class="glow-text">BANDWIDTH USAGE</h1>

    <p class="subtitle">
      <i class="fas fa-chart-line pulse"></i>
      Powered by 360Net
    </p>
  </div>

  <!-- CARDS -->
  <div class="stats-container">

    <div class="stat-card">
      <i class="fas fa-server icon total-icon"></i>
      <p class="stat-label">TOTAL</p>
      <h2>383</h2>
      <span>GB</span>
    </div>

    <div class="stat-card">
      <i class="fas fa-download icon down-icon"></i>
      <p class="stat-label">DOWN</p>
      <h2>345</h2>
      <span>GB</span>
    </div>

    <div class="stat-card">
      <i class="fas fa-upload icon up-icon"></i>
      <p class="stat-label">UP</p>
      <h2>38</h2>
      <span>GB</span>
    </div>

  </div>
  <div class="card card-cyan cyber-border pulse-glow">

  <div class="card-header trend-header">
    <i class="fas fa-chart-area pulse"></i>
    <span>DAILY USAGE TREND</span>
  </div>

  <div class="card-body trend-body">
    <canvas id="usage-chart" width="457" height="312"></canvas>
  </div>

</div>

<!-- STATS SUMMARY CARD -->
<div class="stats-summary-card">

  <div class="stat-row">
    <span class="stat-value cyan">AVG PER DAY</span>
    <span class="stat-value cyan">12.77 GB</span>
  </div>

  <div class="divider"></div>

  <div class="stat-row">
    <span class="stat-label purple">PEAK DAY</span>
    <span class="stat-value purple">20.87 GB</span>
  </div>

  <div class="divider"></div>

  <div class="stat-row">
    <span class="stat-label pink">DATA PLAN</span>
    <span class="stat-value pink">∞ UNLIMITED</span>
  </div>

</div>
